# Lint, test, and build the Next.js static export; deploy it to GitHub Pages,
# then run Lighthouse against the live site and keep the reports as artifacts.
# Pull requests run the build job as a required check, plus a Lighthouse
# audit of the built artifact served locally in the runner.
# Substack posts and GitHub activity/projects are fetched at build time, so
# each deploy refreshes them.
name: Deploy

on:
  push:
    branches: ["main"]
  pull_request:
  # Rebuild weekly so build-time content (Substack posts) stays fresh
  # even without code changes.
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  # Serialize main deploys; give each PR its own group and cancel stale runs.
  group: pages-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      # e.g. "/about" for a project site, "" for a user site or custom domain.
      base_path: ${{ steps.pages.outputs.base_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
        with:
          # Injects basePath when the site is served from a project subpath.
          static_site_generator: next
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: ./out

  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5

  # Audit the PR's build before merge: extract the Pages artifact, serve it
  # locally under the same subpath GitHub Pages will use, and run Lighthouse.
  # Reports land as a run artifact; localhost numbers use Lighthouse's
  # simulated throttling, so they're comparable across PRs.
  lighthouse-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: build
    env:
      BASE_PATH: ${{ needs.build.outputs.base_path }}
    steps:
      - name: Download built site
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: github-pages
          path: pages-artifact
      - name: Extract and serve under the Pages subpath
        run: |
          mkdir -p "site${BASE_PATH}"
          tar -xf pages-artifact/artifact.tar -C "site${BASE_PATH}"
          npx --yes serve@14 site -l 8080 &
          for i in $(seq 1 30); do
            curl -sf "http://localhost:8080${BASE_PATH}/" > /dev/null && exit 0
            sleep 1
          done
          echo "server never became ready" >&2
          exit 1
      - name: Lighthouse audit
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12
        with:
          urls: |
            http://localhost:8080${{ env.BASE_PATH }}/
            http://localhost:8080${{ env.BASE_PATH }}/story/
            http://localhost:8080${{ env.BASE_PATH }}/philosophy/
            http://localhost:8080${{ env.BASE_PATH }}/chat/
          # Median of 3 runs smooths out runner variance.
          runs: 3
          uploadArtifacts: true
          temporaryPublicStorage: false

  # Measure the deployed site so perf work is also grounded in real-hosting
  # numbers (CDN, headers, redirects). Runs after the site is already live
  # and never blocks a deploy.
  lighthouse:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Lighthouse audit
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12
        with:
          urls: |
            ${{ needs.deploy.outputs.page_url }}
            ${{ needs.deploy.outputs.page_url }}story/
            ${{ needs.deploy.outputs.page_url }}philosophy/
            ${{ needs.deploy.outputs.page_url }}chat/
          # Median of 3 runs smooths out network variance on shared runners.
          runs: 3
          uploadArtifacts: true
          temporaryPublicStorage: false
