# Build the Next.js static export and deploy it to GitHub Pages.
# Substack posts are fetched at build time, so each deploy refreshes them;
# GitHub activity/projects are fetched live in the browser.
name: Deploy

on:
  push:
    branches: ["main"]
  # Rebuild weekly so build-time content (Substack posts) stays fresh
  # even without code changes.
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Injects basePath when the site is served from a project subpath.
          static_site_generator: next
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
