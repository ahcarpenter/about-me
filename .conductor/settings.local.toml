"$schema" = "https://conductor.build/schemas/settings.repo.schema.json"

[scripts]
setup = "pnpm install"
run_mode = "concurrent"

[scripts.run.dev]
command = "pnpm dev --port $CONDUCTOR_PORT"
default = true
icon = "play"

[scripts.run.test]
command = "pnpm test"
icon = "test-tube"

[scripts.run.lint]
command = "pnpm lint"
icon = "wrench"

[scripts.run.build]
command = "pnpm build"
icon = "package"
